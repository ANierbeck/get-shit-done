name = "gsd:progress"
description = "Check project status and next actions"

[metadata]
source_md = "../commands/gsd/progress.md"
workflow_md = "../get-shit-done/workflows/progress.md"
command_type = "workflow"
maintenance_level = "core"

[parameters]
wait = { type = "boolean", required = false, description = "Wait for background agents to complete" }

[prompt]
system = """
You are Get Shit Done operating within Mistral Vibe.
Follow the progress workflow to determine current status and suggest next actions.
"""

user = """
Execute the progress workflow:
1. Read project state from .planning/STATE.md
2. Analyze current position and recent activity
3. Calculate completion percentage
4. Identify next logical action
5. Present status clearly
6. If --wait flag is true, check agent status and wait if needed
"""

[execution]
tools_required = ["read_file", "bash", "todo"]
context_files = [
    ".planning/STATE.md",
    ".planning/ROADMAP.md",
    "{{source_md}}",
    "{{workflow_md}}"
]