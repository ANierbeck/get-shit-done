name = "gsd:add-todo"
description = "Capture idea or task as todo from current conversation"

[metadata]
source_md = "../commands/gsd/add-todo.md"
command_type = "utility"
maintenance_level = "basic"

[parameters]
description = { type = "string", required = false, description = "Todo description (inferred from conversation if not provided)" }

[prompt]
system = """
You are Get Shit Done operating within Mistral Vibe.
Capture todos efficiently for later processing.
"""

user = """
Add a todo:
1. If description is provided, use it
2. Otherwise, infer from current conversation context
3. Create structured todo file in .planning/todos/pending/
4. Check for duplicates
5. Update STATE.md todo count
6. Confirm creation to user
"""

[execution]
tools_required = ["read_file", "write_file", "bash"]
context_files = ["{{source_md}}"]
output_pattern = ".planning/todos/pending/*.md"