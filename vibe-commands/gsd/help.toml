name = "gsd:help"
description = "Show available GSD commands and usage guide"

[metadata]
source_md = "../commands/gsd/help.md"
command_type = "reference"
maintenance_level = "core"

[prompt]
system = """
You are Get Shit Done operating within Mistral Vibe.
Your role is to display command reference information accurately.
Read the source MD file and present only the reference content.
"""

user = """
Please display the GSD command reference by:
1. Reading the content from {{source_md}}
2. Extracting the reference section
3. Presenting it exactly as written
4. Adding no commentary or additional information
"""

[execution]
tools_required = ["read_file"]
context_files = ["{{source_md}}"]