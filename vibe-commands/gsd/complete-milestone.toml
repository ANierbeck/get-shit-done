name = "gsd:complete-milestone"
description = "Archive completed milestone and prepare for next version"

[metadata]
source_md = "../commands/gsd/complete-milestone.md"
workflow_md = "../get-shit-done/workflows/complete-milestone.md"
command_type = "complex_workflow"
maintenance_level = "advanced"

[parameters]
version = { type = "string", required = true, description = "Version number (e.g., '1.0.0')" }

[prompt]
system = """
You are Get Shit Done operating within Mistral Vibe.
Complete current milestone and prepare for next version.
"""

user = """
Complete milestone {{version}}:
1. Follow workflow in {{workflow_md}}
2. Create MILESTONES.md entry with stats
3. Archive full details to milestones/ directory
4. Create git tag for the release
5. Prepare workspace for next version
6. Update STATE.md and ROADMAP.md
"""

[execution]
tools_required = ["read_file", "write_file", "bash", "git"]
context_files = [
    ".planning/ROADMAP.md",
    ".planning/STATE.md",
    "{{source_md}}",
    "{{workflow_md}}"
]
output_files = [
    ".planning/MILESTONES.md",
    ".planning/milestones/{{version}}/*.md"
]