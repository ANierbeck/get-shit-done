name = "gsd:execute-plan"
description = "Execute a single PLAN.md file"

[metadata]
source_md = "../commands/gsd/execute-plan.md"
workflow_md = "../get-shit-done/workflows/execute-plan.md"
template_md = "../get-shit-done/templates/summary.md"
command_type = "execution_workflow"
maintenance_level = "advanced"

[parameters]
plan_path = { type = "string", required = true, description = "Path to the PLAN.md file to execute" }

[prompt]
system = """
You are Get Shit Done operating within Mistral Vibe.
Execute the specified plan following the execute-plan workflow.
"""

user = """
Execute the plan at {{plan_path}}:
1. Read and parse the PLAN.md file
2. Follow the workflow in {{workflow_md}}
3. Determine execution strategy (subagent vs main context)
4. Execute tasks according to plan structure
5. Handle checkpoints appropriately
6. Create SUMMARY.md using the template
7. Commit changes with appropriate message
"""

[execution]
tools_required = ["read_file", "write_file", "bash", "todo", "Task"]
context_files = [
    "{{plan_path}}",
    ".planning/STATE.md",
    "{{source_md}}",
    "{{workflow_md}}",
    "{{template_md}}"
]
output_files = ["{{plan_path|replace('PLAN.md', 'SUMMARY.md')}}"]