[command]
name = "gsd:add-todo"
aliases = ["/gsd:add-todo", "/gsd:at"]
description = "Capture idea or task as todo from current conversation"
type = "prompt"
template = '''You are Get Shit Done operating within Mistral Vibe.
Capture todos efficiently for later processing.

Add a todo:
1. If description is provided, use it
2. Otherwise, infer from current conversation context
3. Create structured todo file in .planning/todos/pending/
4. Check for duplicates
5. Update STATE.md todo count
6. Confirm creation to user'''